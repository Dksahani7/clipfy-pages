        function initPlayer() {
            // ---- CONFIG ----
            const DATA_URL = "https://pub-a3ad4cec48664940879fc5dd37a07293.r2.dev/index.json";
            const R2_STREAM_BASE = "https://pub-a3ad4cec48664940879fc5dd37a07293.r2.dev/";

            // Ad timing config with Waterfall (Backup Zones)
            const AD_ZONES = {
                // [Primary, Backup]
                preRoll: [
                    'https://s.magsrv.com/v1/vast.php?idzone=5825490',
                    'https://syndication.exoclick.com/splash.php?idzone=5829428&type=vast'
                ],
                midRoll1: [
                    'https://s.magsrv.com/v1/vast.php?idzone=5825488',
                    'https://syndication.exoclick.com/splash.php?idzone=5830146&type=vast'
                ],
                midRoll2: [

                ],
                postRoll: [
                    'https://s.magsrv.com/v1/vast.php?idzone=5825546',

                onPause: [
                    'https://s.magsrv.com/v1/vast.php?idzone=5830136',
                    'https://s.magsrv.com/v1/vast.php?idzone=5825548'
                ],
            };

            const player = document.getElementById("player");

            const mainTitle = document.getElementById("mainTitle");
            const creatorNameEl = document.getElementById("creatorName");
            const timeAgoEl = document.getElementById("timeAgo");
            const viewsEl = document.getElementById("views");
            const likesEl = document.getElementById("likes");
            const creatorDp = document.getElementById("creatorDp");
            const suggestions = document.getElementById("suggestions");

            const adConfigs = [
                { class: 'eas6a97888e37', zoneid: '5829556' },
                { class: 'eas6a97888e38', zoneid: '5829557' },
                { class: 'eas6a97888e39', zoneid: '5829558' }
            ];

            let videos = {};
            let currentVideoId = null;
            let allSuggestionIds = [];
            let suggestionsLoaded = 0;
            let isInitialLoad = true;



            // Disable right-click
            player.addEventListener('contextmenu', e => e.preventDefault());

            // User interaction for ads


            /* --------- SEO Update Function --------- */
            function updateSEO(v) {
                // 1. Dynamic Title with Keywords (Front-loaded for SEO)
                const seoTitle = `XXX Video ${v.title.substring(0, 55)} | Desi Leaked Viral - Clipfy`;
                document.title = seoTitle;

                // 2. Dynamic Meta Description
                let metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.content = `Watch ${v.title.substring(0, 135)} - Free HD streaming on Clipfy`;
                }

                // 3. Canonical URL
                const canonical = document.getElementById('canonical');
                if (canonical) {
                    canonical.href = `https://clipfy.store/streamtape/player?v=${v.videoid}`;
                }

                // 4. Open Graph Tags
                const ogUrl = document.getElementById('ogUrl');
                const ogTitle = document.getElementById('ogTitle');
                const ogDesc = document.getElementById('ogDesc');
                const ogImage = document.getElementById('ogImage');

                if (ogUrl) ogUrl.content = window.location.href;
                if (ogTitle) ogTitle.content = v.title;
                if (ogDesc) ogDesc.content = `Watch ${v.title.substring(0, 140)}`;
                if (ogImage) ogImage.content = v.thumb;

                // 5. Video Schema Markup (JSON-LD)
                const videoSchema = {
                    "@context": "https://schema.org",
                    "@type": "VideoObject",
                    "name": v.title,
                    "description": `${v.title} - Desi Indian viral video full HD`,
                    "thumbnailUrl": v.thumb,
                    "uploadDate": v.date || "2024-12-01",
                    "contentUrl": R2_STREAM_BASE + "videos/" + v.videoid + ".mp4",
                    "embedUrl": `https://clipfy.store/streamtape/player?v=${v.videoid}`,
                    "duration": v.duration ? `PT${Math.floor(v.duration / 60)}M${v.duration % 60}S` : "PT5M",

                        "@type": "InteractionCounter",
                        "interactionType": { "@type": "WatchAction" },

                    }
                };

                const videoSchemaEl = document.getElementById('videoSchema');
                if (videoSchemaEl) {
                    videoSchemaEl.textContent = JSON.stringify(videoSchema);
                }

                // 6. Breadcrumb Schema
                const breadcrumb = {
                    "@context": "https://schema.org",
                    "@type": "BreadcrumbList",
                    "itemListElement": [
                        {
                            "@type": "ListItem",
                            "position": 1,
                            "name": "Home",
                            "item": "https://clipfy.store"
                        },
                        {
                            "@type": "ListItem",
                            "position": 2,
                            "name": v.title.substring(0, 50),
                            "item": window.location.href
                        }
                    ]
                };

                const breadcrumbSchemaEl = document.getElementById('breadcrumbSchema');
                if (breadcrumbSchemaEl) {
                    breadcrumbSchemaEl.textContent = JSON.stringify(breadcrumb);
                }
            }

            /* --------- Helpers --------- */
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            /* --------- Load Data --------- */
            fetch(DATA_URL, { cache: "no-store" })
                .then(r => r.json())
                .then(data => {
                    const list = Array.isArray(data) ? data : (data.videos || []);

                    console.log("✅ Fetched", list.length, "videos");

                    if (!list.length) {
                        mainTitle.textContent = "No videos available.";
                        return;
                    }

                    // Populate videos object
                    list.forEach(item => {
                        videos[item.videoid] = item;
                    });

                    console.log("✅ Videos loaded:", Object.keys(videos).length);



                    // Get video ID from URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const vId = urlParams.get('v');
                    const videoKeys = Object.keys(videos);
                    const firstId = videoKeys.length > 0 ? videoKeys[0] : null;

                    if (vId && videos[vId]) {
                        loadVideo(vId);
                    } else if (firstId) {
                        loadVideo(firstId);
                    }

                    const currentV = vId || firstId;
                    renderSuggestions(currentV);
                })
                .catch(err => {
                    console.error("❌ Data load error:", err);
                    mainTitle.textContent = "Failed to load videos.";
                });

            /* --------- Load Video --------- */
            function loadVideo(id, isHistoryNavigation = false) {
                console.log("🎬 Loading video:", id, isHistoryNavigation ? "(from history)" : "");

                // 1. Destroy existing Fluid Player instance FIRST
                // This ensures we have a clean video element before setting new source
                try {
                    if (window._fluidPlayerInstance) {
                        window._fluidPlayerInstance.destroy();
                        console.log("✅ Fluid Player destroyed");
                    }
                } catch (e) {
                    console.error("⚠️ Fluid Player destroy failed:", e);
                }

                // 2. Re-fetch player element (incase destroy replaced it)
                let playerRef = document.getElementById("player");

                // 🔥 FIX: Agar destroy() ne element uda diya, toh naya banao
                if (!playerRef) {
                    console.warn("⚠️ Player element missing! Re-creating...");
                    const videoBox = document.querySelector('.video-box');
                    if (videoBox) {
                        videoBox.innerHTML = ''; // Clear mess
                        playerRef = document.createElement('video');
                        playerRef.id = 'player';
                        playerRef.controls = true;
                        playerRef.preload = 'metadata';
                        playerRef.setAttribute('controlsList', 'nodownload');
                        playerRef.setAttribute('playsinline', '');
                        playerRef.style.width = '100%';
                        playerRef.style.height = '100%';
                        videoBox.appendChild(playerRef);
                        console.log("✅ New player element created.");
                    } else {
                        console.error("❌ Critical: .video-box container missing!");
                        return;
                    }
                }

                const v = videos[id];
                if (!v) {
                    console.error("❌ Video not found:", id);
                    return;
                }

                currentVideoId = id;

                // 3. Set new video source using <source> tags (More robust for Fluid Player)
                playerRef.removeAttribute('src');
                while (playerRef.firstChild) {
                    playerRef.removeChild(playerRef.firstChild);
                }

                const source = document.createElement('source');
                
                // Logic to support both R2 and external MP4 links
                if (v.source_url && v.source_url.startsWith('http')) {
                    source.src = v.source_url;
                } else if (v.stream_id && v.stream_id.startsWith('http')) {
                    source.src = v.stream_id;
                } else {
                    source.src = R2_STREAM_BASE + "videos/" + (v.stream_id || v.videoid) + ".mp4";
                }
                
                source.type = "video/mp4";
                playerRef.appendChild(source);

                playerRef.poster = v.thumb || "";
                playerRef.load(); // 🔥 Important: Force reload to recognize new source

                // 4. Initialize Fluid Player
                // Video duration ke hisaab se adList banao
                const dur = playerRef.duration || 0;
                const cb = Date.now(); // cache buster
                const adList = [];

                // Helper to prepare waterfall tags
                const getTags = (zoneKey) => {
                    const zones = AD_ZONES[zoneKey];
                    return zones.map(url => {
                        const separator = url.includes('?') ? '&' : '?';
                        return url + separator + 'cb=' + cb;
                    });
                };

                // Pre-roll: sirf 2 min se badi videos pe
                if (dur === 0 || dur > 120) {
                    adList.push({
                        roll: 'preRoll',
                        vastTag: getTags('preRoll'), // Array passes directly for Waterfall
                        adText: 'Ad'
                    });
                }

                // Mid-roll timing: video length ke hisaab se
                if (dur === 0 || dur <= 300) {
                    // 5 min se choti: 20% aur 50% pe
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll1'),
                        timer: dur > 0 ? Math.floor(dur * 0.20) : 30,
                        adText: 'Ad'
                    });
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll2'),
                        timer: dur > 0 ? Math.floor(dur * 0.50) : 60,
                        adText: 'Ad'
                    });
                } else if (dur <= 600) {
                    // 5-10 min: 50% aur 90% pe
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll1'),
                        timer: Math.floor(dur * 0.50),
                        adText: 'Ad'
                    });
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll2'),
                        timer: Math.floor(dur * 0.90),
                        adText: 'Ad'
                    });
                } else {
                    // 10 min se badi: 30%, 60%, 90% pe
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll1'),
                        timer: Math.floor(dur * 0.30),
                        adText: 'Ad'
                    });
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('midRoll2'),
                        timer: Math.floor(dur * 0.60),
                        adText: 'Ad'
                    });
                    adList.push({
                        roll: 'midRoll',
                        vastTag: getTags('postRoll'),
                        timer: Math.floor(dur * 0.90),
                        adText: 'Ad'
                    });
                }

                // Post-roll aur OnPause — hamesha
                adList.push({
                    roll: 'postRoll',
                    vastTag: getTags('postRoll'),
                    adText: 'Ad'
                });
                adList.push({
                    roll: 'onPauseRoll',
                    vastTag: getTags('onPause'),
                    adText: 'Ad'
                });

                window._fluidPlayerInstance = fluidPlayer('player', {
                    vastOptions: {
                        adList: adList,
                        adCTAText: false,
                        vastTimeout: 8000,
                        showPlayButton: true,
                        skipButtonCaption: 'Skip in [seconds]',
                        skipButtonClickCaption: 'Skip Ad ×'
                    },
                    layoutControls: {
                        primaryColor: '#ff2f5b',
                        playButtonShowing: true,
                        playPauseAnimation: true,
                        fillToContainer: true,
                        autoPlay: false,
                        mute: false,
                        allowTheatre: false,
                        playbackRateEnabled: false,
                        allowDownload: false,
                        controlBar: {
                            autoHide: true,
                            autoHideTimeout: 3,
                            animated: true
                        }
                    }
                });


                // View count tracking - only count after 10% watched or video ends
                let viewCountedFlag = false;
                let watchedPercentage = 0;
                let maxWatchedPercent = 0;

                function countView() {
                    if (!viewCountedFlag && !isHistoryNavigation) {
                        viewCountedFlag = true;

                        // Track view on backend
                        fetch(`/api/track/play`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                videoid: id,
                                watchPercent: Math.round(maxWatchedPercent),
                                source: 'player',
                                duration: Math.round(playerRef.duration) // Use playerRef
                            })
                        }).catch(err => console.error("Track error:", err));

                        // Also increment views in old endpoint for compatibility
                        fetch(`/api/watch`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ videoid: id })
                        })
                            .then(() => console.log("View counted"))
                            .catch(err => console.error("View count error:", err));

                        // Track geo location
                        try {
                            fetch('https://ipapi.co/json/', { headers: { 'Accept': 'application/json' } })
                                .then(r => r.json())
                                .then(data => {
                                    fetch('/api/track/geo', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ country: data.country_code || 'UNKNOWN' })
                                    }).catch(() => { });
                                })
                                .catch(() => { });
                        } catch (e) { }
                    }
                }

                // Track video progress for 10% threshold and max watch
                // Use 'on' properties to prevent listener stacking on same element
                playerRef.ontimeupdate = () => {
                    if (!viewCountedFlag && playerRef.duration > 0) {
                        watchedPercentage = (playerRef.currentTime / playerRef.duration) * 100;
                        maxWatchedPercent = Math.max(maxWatchedPercent, watchedPercentage);

                        // Count view when user watches 10% or more
                        if (watchedPercentage >= 10) {
                            countView();
                        }
                    }
                };

                // Also count view when video ends
                playerRef.onended = () => {
                    countView();
                };

                // Update UI
                mainTitle.textContent = v.title || "Clipfy Video";
                creatorNameEl.textContent = v.creator || "Clipfy";
                timeAgoEl.textContent = v.timeago || "Recently";
                viewsEl.textContent = ((v.views || 0) + 1).toLocaleString(); // Increment locally
                likesEl.textContent = (v.likes || 0).toLocaleString();

                if (v.creator_dp) creatorDp.style.backgroundImage = `url(${v.creator_dp})`;

                // Update all SEO elements
                updateSEO(v);

                // Update URL and history (only if not from history navigation and not initial load)
                if (!isHistoryNavigation && !isInitialLoad) {
                    const newUrl = `${window.location.pathname}?v=${encodeURIComponent(id)}`;
                    history.pushState({ videoid: id }, "", newUrl);
                }

                // Render suggestions
                renderSuggestions(id);

                // Mark initial load as complete
                isInitialLoad = false;
            }

            function renderSuggestions(current, append = false) {
                console.log("=== Rendering Suggestions ===");

                if (Object.keys(videos).length === 0) {
                    console.error("No videos!");
                    return;
                }

                if (!append) {
                    suggestions.innerHTML = "";
                    const currentV = videos[current];
                    const allIds = Object.keys(videos);
                    
                    // Filter out current video
                    let filteredIds = allIds.filter(i => i !== current);
                    
                    // SMART RANKING: Boost videos with similar title words
                    const currentTitleWords = (currentV.title || "").toLowerCase().split(/\s+/).filter(w => w.length > 2);
                    
                    filteredIds.sort((a, b) => {
                        const titleA = (videos[a].title || "").toLowerCase();
                        const titleB = (videos[b].title || "").toLowerCase();
                        
                        let scoreA = currentTitleWords.filter(w => titleA.includes(w)).length;
                        let scoreB = currentTitleWords.filter(w => titleB.includes(w)).length;
                        
                        // Add some randomness so it's not always the same
                        return (scoreB + Math.random()) - (scoreA + Math.random());
                    });

                    allSuggestionIds = filteredIds;
                    suggestionsLoaded = 0;
                }

                const batchSize = 13;
                const nextBatch = allSuggestionIds.slice(suggestionsLoaded, suggestionsLoaded + batchSize);

                // Render videos
                nextBatch.forEach(id => {
                    const v = videos[id];
                    if (!v) return;

                    const card = document.createElement("div");
                    card.className = "suggestion-item";
                    card.innerHTML = `
            <div class="suggestion-thumbnail" style="position:relative;">
                <img loading="lazy" src="${v.thumb || 'https://via.placeholder.com/640x360?text=No+Thumbnail'}">
                ${index < 4 ? '<span style="position:absolute;top:5px;left:5px;background:var(--accent);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,0.5);">🔥 TRENDING</span>' : ''}
            </div>
            <div class="suggestion-title">${v.title || "Untitled"}</div>
        `;
                    card.onclick = () => {
                        loadVideo(id);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    };
                    suggestions.appendChild(card);
                });

                // 🔥 CHANGE #7: Suggestion Ads - 2 ads per section
                const videoCards = suggestions.querySelectorAll('.suggestion-item:not(.ad-item)');
                if (videoCards.length >= 10) {
                    const AD_COUNT = 2; // 2 ads (increased from 1)

                    // Pure random positions with MIN_GAP
                    const MIN_GAP = 4; // Minimum 4 video cards between ads
                    const positions = [];
                    while (positions.length < AD_COUNT) {
                        const pos = Math.floor(Math.random() * (videoCards.length - 2)) + 1;

                        // Check if position is too close to existing ads
                        const isTooClose = positions.some(existingPos =>
                            Math.abs(existingPos - pos) < MIN_GAP
                        );

                        if (!positions.includes(pos) && !isTooClose) {
                            positions.push(pos);
                        }
                    }

                    positions.forEach(index => {
                        const adDiv = document.createElement('div');
                        adDiv.className = 'suggestion-item ad-item';

                        const adIns = document.createElement('ins');
                        adIns.className = 'eas6a97888e37';
                        adIns.setAttribute('data-zoneid', '5829556');

                        adDiv.appendChild(adIns);
                        videoCards[index].after(adDiv);

                        const adScript = document.createElement('script');
                        adScript.textContent = '(AdProvider = window.AdProvider || []).push({ serve: {} });';
                        adDiv.appendChild(adScript);
                    });
                }

                suggestionsLoaded += batchSize;

                const loadMoreBtn = document.getElementById("loadMoreBtn");
                const remaining = allSuggestionIds.length - suggestionsLoaded;

                if (remaining > 0) {
                    loadMoreBtn.style.display = "block";
                    loadMoreBtn.textContent = `See More Videos (+${Math.min(12, remaining)})`;
                } else {
                    loadMoreBtn.style.display = "none";
                }
            }

            /* --------- Report Button --------- */
            document.getElementById("reportBtn").onclick = () => {
                alert("✅ Report feature coming soon!");
            };

            /* --------- Load More Button --------- */
            document.getElementById("loadMoreBtn").onclick = () => {
                renderSuggestions(currentVideoId, true);
            };

            // Handle browser back/forward buttons
            window.addEventListener('popstate', function (event) {
                if (event.state && event.state.videoid) {
                    loadVideo(event.state.videoid, true);
                }
            });

            function toggleFullscreen() {
                let videoBox = document.querySelector('.video-box');
                if (!document.fullscreenElement) {
                    if (videoBox.requestFullscreen) {
                        videoBox.requestFullscreen();
                    } else if (videoBox.webkitRequestFullscreen) {
                        videoBox.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }

            // Browser ke default fullscreen change ko monitor karein

        } // CLOSE initPlayer() function
    </script>
